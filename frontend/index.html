<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring RAG Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h2>ADBOT</h2>
            <p>Ask me questions about your Server Metrics</p>
        </header>

        <main class="chat-box" id="chat-box">
            <!-- Messages will be injected here via JavaScript -->
            <div class="message assistant">
                <div class="text">Hello! I am your AI monitoring assistant. What would you like to know about the system?</div>
            </div>
        </main>

        <footer class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your question..." autocomplete="off" />
            <button id="send-button">Send</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
